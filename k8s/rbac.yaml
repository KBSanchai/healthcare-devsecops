apiVersion: v1
kind: ServiceAccount
metadata:
  name: healthcare-app-sa
  namespace: healthcare
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: healthcare-app-role
  namespace: healthcare
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: []
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: healthcare-app-rolebinding
  namespace: healthcare
subjects:
- kind: ServiceAccount
  name: healthcare-app-sa
  namespace: healthcare
roleRef:
  kind: Role
  name: healthcare-app-role
  apiGroup: rbac.authorization.k8s.io
