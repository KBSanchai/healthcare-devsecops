apiVersion: v1
kind: ServiceAccount
metadata:
  name: healthcare-app-sa
  namespace: healthcare
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: healthcare-app-role
  namespace: healthcare
rules:
# Access to ConfigMaps
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]

# Access to Secrets (FIXED)
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list", "create", "update", "delete"]

# (Optional but recommended for app)
- apiGroups: [""]
  resources: ["pods", "services"]
  verbs: ["get", "list", "watch"]

# (Optional for deployments)
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list", "watch", "create", "update", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: healthcare-app-rolebinding
  namespace: healthcare
subjects:
- kind: ServiceAccount
  name: healthcare-app-sa
  namespace: healthcare
roleRef:
  kind: Role
  name: healthcare-app-role
  apiGroup: rbac.authorization.k8s.io
